<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: 'Inter', Helvetica, Arial, sans-serif; background-color: #0a0a0a; color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background-color: #1a1a1a; padding: 30px; border-radius: 10px; border: 1px solid #333; }
        .header { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .logo { font-size: 24px; font-weight: bold; color: #d4af37; text-decoration: none; font-family: 'Playfair Display', serif; }
        .content { line-height: 1.6; color: #cccccc; }
        .footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #333; text-align: center; font-size: 12px; color: #888888; }
        h1, h2, h3 { color: #ffffff; font-family: 'Playfair Display', serif; }
        a { color: #d4af37; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{{ site_url|default:'#' }}" class="logo">BONGS.</a>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            &copy; 2026 Bongs Luxury Glass. All rights reserved.<br>
            100 Luxury Avenue, Design District, New York, NY 10001
        </div>
    </div>
</body>
</html>
